server:
  port: 8081

spring:
  application:
    name: VENTAS
  datasource:
    url: jdbc:h2:mem:ventasdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

# Configuración de URLs para microservicios externos (Simulados para el adapter REST)
services:
  vendedores:
    url: http://localhost:8082
  clientes:
    url: http://localhost:8083
  mesas:
    url: http://localhost:8084
  recetas:
    url: http://localhost:8085
  descuentos:
    url: http://localhost:8086
